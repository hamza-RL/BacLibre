<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bac Libre — Sciences Physiques</title>
<style>
  :root{
    --bg: #f4f6f9;
    --bg-soft: #ffffff;
    --ink: #2a3142;
    --ink-soft: #6b7385;
    --line: #e3e7ee;
    --slate: #5b7c99;
    --slate-deep: #3f5b73;
    --amber: #d99a4e;
    --amber-soft: #f3e3c8;
    --green: #6f9b6f;
    --red: #c97a6b;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(40,50,70,.04), 0 6px 20px rgba(40,50,70,.06);
    font-family: 'Söhne', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  body.dark{
    --bg: #14171f;
    --bg-soft: #1c2029;
    --ink: #e4e7ee;
    --ink-soft: #8b93a5;
    --line: #2a2f3b;
    --slate: #6f93b3;
    --slate-deep: #8ab0d4;
    --amber: #e0a85e;
    --amber-soft: #3a3020;
    --green: #7fae7f;
    --red: #d18a7a;
    --shadow: 0 1px 2px rgba(0,0,0,.2), 0 6px 20px rgba(0,0,0,.3);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background: var(--bg);
    color: var(--ink);
    font-size:15px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    transition:background .2s, color .2s;
  }
  ::-webkit-scrollbar{width:8px; height:8px;}
  ::-webkit-scrollbar-thumb{background:#d3d9e3; border-radius:8px;}
  ::-webkit-scrollbar-track{background:transparent;}
  body.dark ::-webkit-scrollbar-thumb{background:#3a3f4d;}

  a{color:var(--slate-deep); text-decoration:none;}

  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
  input, select, textarea{
    font-family:inherit; font-size:14px; border:1px solid var(--line);
    border-radius:8px; padding:8px 10px; background:var(--bg-soft); color:var(--ink);
    outline:none; transition:border-color .15s;
  }
  input:focus, select:focus, textarea:focus{border-color:var(--slate);}

  /* ===== Layout ===== */
  #app{display:flex; min-height:100vh;}

  /* ----- Sidebar ----- */
  #sidebar{
    width:230px; flex-shrink:0; background:var(--bg-soft);
    border-right:1px solid var(--line);
    display:flex; flex-direction:column; padding:20px 14px;
    position:sticky; top:0; height:100vh;
  }
  .brand{display:flex; align-items:center; gap:10px; padding:4px 8px 18px 8px;}
  .brand-mark{
    width:34px; height:34px; border-radius:10px;
    background:linear-gradient(135deg,var(--slate),var(--slate-deep));
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-weight:700; font-size:15px; flex-shrink:0;
  }
  .brand-text{display:flex; flex-direction:column; line-height:1.2;}
  .brand-text strong{font-size:14px; letter-spacing:.2px;}
  .brand-text span{font-size:11px; color:var(--ink-soft);}

  nav.navlist{display:flex; flex-direction:column; gap:2px; margin-top:6px; overflow-y:auto;}
  .navbtn{
    display:flex; align-items:center; gap:10px;
    padding:9px 10px; border-radius:9px; font-size:13.5px;
    color:var(--ink-soft); font-weight:500; text-align:left; width:100%;
  }
  .navbtn .ic{width:18px; text-align:center; opacity:.8; font-size:14px;}
  .navbtn:hover{background:var(--bg); color:var(--ink);}
  .navbtn.active{background:var(--slate); color:#fff;}
  .navbtn.active .ic{opacity:1;}

  .sidebar-divider{height:1px; background:var(--line); margin:14px 4px;}
  .nav-group-label{font-size:10.5px; text-transform:uppercase; letter-spacing:.6px; color:var(--ink-soft); padding:10px 10px 4px; opacity:.7;}

  #sidebar-progress{
    margin-top:auto; padding:14px 10px; border-radius:12px;
    background:var(--bg); border:1px solid var(--line); flex-shrink:0;
  }
  #sidebar-progress .label{font-size:11px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px;}
  #sidebar-progress .pct{font-size:24px; font-weight:700; color:var(--slate-deep);}
  .miniBar{height:6px; border-radius:6px; background:var(--line); margin-top:8px; overflow:hidden;}
  .miniBar > div{height:100%; background:linear-gradient(90deg,var(--slate),var(--amber)); border-radius:6px; transition:width .4s;}

  .darkToggleRow{display:flex; align-items:center; justify-content:space-between; padding:8px 10px; margin-top:8px;}
  .darkToggleRow span{font-size:12.5px; color:var(--ink-soft);}
  .switch{width:36px; height:20px; border-radius:20px; background:var(--line); position:relative; cursor:pointer; flex-shrink:0;}
  .switch.on{background:var(--slate);}
  .switch .knob{width:16px; height:16px; border-radius:50%; background:#fff; position:absolute; top:2px; left:2px; transition:left .15s;}
  .switch.on .knob{left:18px;}

  /* ----- Main content ----- */
  #main{flex:1; min-width:0; display:flex; flex-direction:column;}
  #topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 28px; border-bottom:1px solid var(--line); background:var(--bg-soft);
    gap:20px; flex-wrap:wrap;
  }
  #topbar h1{font-size:18px; font-weight:650;}
  #topbar .sub{font-size:12.5px; color:var(--ink-soft); margin-top:2px;}

  #countdown{display:flex; align-items:center; gap:14px; background:var(--bg-soft); border:1px solid var(--line); border-radius:12px; padding:8px 16px; box-shadow:var(--shadow);}
  .cd-unit{display:flex; flex-direction:column; align-items:center; min-width:42px;}
  .cd-unit b{font-size:19px; font-weight:700; color:var(--slate-deep); line-height:1;}
  .cd-unit span{font-size:9.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.4px; margin-top:2px;}
  .cd-sep{color:var(--line); font-size:14px;}
  #countdown .editdate{font-size:11px; color:var(--ink-soft); cursor:pointer; margin-left:6px; text-decoration:underline; text-decoration-color:var(--line);}

  #content{flex:1; padding:26px 28px 80px; overflow-y:auto;}
  .view{display:none;}
  .view.active{display:block; animation:fadeIn .25s ease;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}

  .distraction-free #sidebar, .distraction-free #topbar, .distraction-free #fabChat{display:none !important;}
  .distraction-free #content{padding:30px 6vw; max-width:900px; margin:0 auto;}

  /* ----- Dashboard cards ----- */
  .grid-stats{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px;}
  .stat-card{background:var(--bg-soft); border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px; box-shadow:var(--shadow);}
  .stat-card .num{font-size:26px; font-weight:700; color:var(--slate-deep);}
  .stat-card .lbl{font-size:12px; color:var(--ink-soft); margin-top:2px;}

  .section-title{font-size:13px; font-weight:650; text-transform:uppercase; letter-spacing:.6px; color:var(--ink-soft); margin:28px 0 12px; display:flex; align-items:center; justify-content:space-between;}
  .section-title:first-child{margin-top:0;}

  .module-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px;}
  .module-card{background:var(--bg-soft); border:1px solid var(--line); border-radius:var(--radius); padding:18px; cursor:pointer; box-shadow:var(--shadow); transition:transform .15s, box-shadow .15s; position:relative; overflow:hidden;}
  .module-card:hover{transform:translateY(-2px); box-shadow:0 4px 16px rgba(40,50,70,.12);}
  .module-card .top-row{display:flex; align-items:center; justify-content:space-between;}
  .module-card .icon-badge{width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:15px; color:#fff; flex-shrink:0;}
  .module-card .coef-tag{font-size:11px; color:var(--ink-soft); background:var(--bg); border-radius:6px; padding:3px 8px; font-weight:600;}
  .module-card h3{font-size:15.5px; font-weight:650; margin-top:12px;}
  .module-card .meta{font-size:12px; color:var(--ink-soft); margin-top:2px;}
  .module-card .pctline{display:flex; align-items:center; justify-content:space-between; margin-top:14px; font-size:12px; color:var(--ink-soft);}
  .module-card .pctline b{color:var(--ink); font-size:13px;}
  .module-card .bar{height:7px; border-radius:7px; background:var(--bg); margin-top:8px; overflow:hidden;}
  .module-card .bar > div{height:100%; border-radius:7px; transition:width .4s;}

  /* ----- Module detail view ----- */
  .module-header{display:flex; align-items:center; gap:16px; margin-bottom:20px; flex-wrap:wrap; justify-content:space-between;}
  .module-header-left{display:flex; align-items:center; gap:16px;}
  .module-header .icon-badge-lg{width:52px; height:52px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:20px; color:#fff;}
  .module-header h2{font-size:22px; font-weight:700;}
  .module-header .meta-line{font-size:13px; color:var(--ink-soft); margin-top:3px;}
  .back-link{font-size:13px; color:var(--ink-soft); margin-bottom:14px; display:inline-flex; align-items:center; gap:4px; cursor:pointer;}
  .back-link:hover{color:var(--ink);}

  .tab-row{display:flex; gap:6px; margin-bottom:18px; border-bottom:1px solid var(--line);}
  .tab-btn{padding:9px 14px; font-size:13px; font-weight:600; color:var(--ink-soft); border-bottom:2px solid transparent; cursor:pointer;}
  .tab-btn.active{color:var(--slate-deep); border-bottom-color:var(--slate);}

  .chapter-card{background:var(--bg-soft); border:1px solid var(--line); border-radius:12px; padding:16px 18px; margin-bottom:10px; transition:border-color .15s;}
  .chapter-card.done{border-color:#cfe0cf;}
  body.dark .chapter-card.done{border-color:#3d5a3d;}
  .chapter-top{display:flex; align-items:flex-start; gap:12px;}
  .chk{width:22px; height:22px; border-radius:7px; border:2px solid var(--line); flex-shrink:0; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .15s; margin-top:1px;}
  .chk.checked{background:var(--green); border-color:var(--green); color:#fff;}
  .chapter-title{flex:1; font-size:14.5px; font-weight:600; line-height:1.4;}
  .chapter-title.done{color:var(--ink-soft); text-decoration:line-through; text-decoration-color:var(--line);}
  .chapter-num{font-size:11.5px; color:var(--ink-soft); font-weight:600; margin-right:4px;}
  .expand-btn{font-size:12px; color:var(--ink-soft); cursor:pointer; padding:4px 8px; border-radius:6px; white-space:nowrap;}
  .expand-btn:hover{background:var(--bg);}
  .chapter-actions{display:flex; gap:4px; flex-shrink:0;}
  .icon-btn{font-size:13px; color:var(--ink-soft); cursor:pointer; padding:4px 7px; border-radius:6px;}
  .icon-btn:hover{background:var(--bg); color:var(--ink);}
  .icon-btn.danger:hover{color:var(--red);}

  .chapter-body{display:none; margin-top:14px; padding-top:14px; border-top:1px dashed var(--line);}
  .chapter-body.open{display:block;}

  .confidence-row{display:flex; align-items:center; gap:8px; margin-bottom:14px;}
  .confidence-row span.lbl{font-size:12px; color:var(--ink-soft);}
  .conf-dot{width:24px; height:24px; border-radius:50%; border:1.5px solid var(--line); cursor:pointer; font-size:11px; display:flex; align-items:center; justify-content:center; font-weight:700; color:var(--ink-soft);}
  .conf-dot.active-1{background:#d18a7a; border-color:#d18a7a; color:#fff;}
  .conf-dot.active-2{background:#dba968; border-color:#dba968; color:#fff;}
  .conf-dot.active-3{background:#d9c168; border-color:#d9c168; color:#fff;}
  .conf-dot.active-4{background:#9bbf7e; border-color:#9bbf7e; color:#fff;}
  .conf-dot.active-5{background:#6f9b6f; border-color:#6f9b6f; color:#fff;}

  .res-row{display:flex; gap:8px; margin-bottom:8px; align-items:center; flex-wrap:wrap;}
  .res-row input{flex:1; min-width:120px;}
  .res-row select{width:110px; flex-shrink:0;}
  .res-list{display:flex; flex-direction:column; gap:6px; margin-top:6px;}
  .res-item{display:flex; align-items:center; gap:8px; padding:7px 10px; background:var(--bg); border-radius:8px; font-size:13px;}
  .res-item .res-ic{width:16px; flex-shrink:0; text-align:center; opacity:.7;}
  .res-item a{flex:1; color:var(--ink); font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .res-item a:hover{color:var(--slate-deep); text-decoration:underline;}
  .res-item .rm{color:var(--ink-soft); font-size:14px; flex-shrink:0; cursor:pointer; padding:2px 5px;}
  .res-item .rm:hover{color:var(--red);}
  .res-item .tag{font-size:10px; padding:2px 6px; border-radius:5px; font-weight:700; text-transform:uppercase; flex-shrink:0;}
  .tag-pdf{background:#fde3df; color:#a4503f;}
  .tag-video{background:#e0e9f5; color:#3f5b73;}
  .tag-playlist{background:#ece0f5; color:#6b3f8a;}
  .tag-link{background:#e3eee3; color:#3f6b3f;}
  body.dark .tag-pdf{background:#4a2e29; color:#e8a895;}
  body.dark .tag-video{background:#27384a; color:#a8c5e8;}
  body.dark .tag-playlist{background:#3a2c4a; color:#cba8e8;}
  body.dark .tag-link{background:#2c3e2c; color:#a8d8a8;}

  .add-btn{font-size:12.5px; color:var(--slate-deep); font-weight:600; cursor:pointer; padding:6px 10px; border-radius:7px; border:1px dashed var(--slate); display:inline-flex; align-items:center; gap:5px;}
  .add-btn:hover{background:var(--bg);}

  .notes-box{margin-top:10px;}
  .notes-box textarea{width:100%; min-height:60px; resize:vertical; font-size:13px;}

  .edit-chapter-row{display:flex; gap:8px; flex:1;}
  .edit-chapter-row input{flex:1;}

  .link-card{background:var(--bg-soft); border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin-bottom:10px; display:flex; align-items:center; gap:12px;}
  .link-card .ic{font-size:16px; opacity:.7;}
  .link-card a{flex:1; font-weight:600; font-size:14px;}
  .link-card .desc{font-size:12px; color:var(--ink-soft);}

  .flash-controls{display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; align-items:center;}
  .flashcard{
    background:var(--bg-soft); border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow);
    min-height:220px; display:flex; align-items:center; justify-content:center; text-align:center;
    padding:30px; cursor:pointer; font-size:17px; font-weight:600; line-height:1.5; position:relative;
    max-width:680px; margin:0 auto 20px;
  }
  .flashcard .face-label{position:absolute; top:14px; left:18px; font-size:10.5px; text-transform:uppercase; letter-spacing:.5px; color:var(--ink-soft); font-weight:700;}
  .flash-nav{display:flex; justify-content:center; gap:10px; align-items:center;}
  .flash-nav button{background:var(--bg); border:1px solid var(--line); padding:8px 16px; border-radius:9px; font-size:13px; font-weight:600;}
  .flash-nav button:hover{background:var(--slate); color:#fff;}
  .flash-progress{text-align:center; font-size:12.5px; color:var(--ink-soft); margin-top:10px;}
  .flash-rate-row{display:flex; justify-content:center; gap:8px; margin-top:16px;}
  .flash-rate-row button{font-size:12.5px; padding:7px 14px; border-radius:8px; font-weight:600;}

  .pomo-card{background:var(--bg-soft); border:1px solid var(--line); border-radius:var(--radius); padding:30px; text-align:center; max-width:380px; margin:0 auto 24px; box-shadow:var(--shadow);}
  .pomo-time{font-size:52px; font-weight:700; color:var(--slate-deep); letter-spacing:1px; margin:14px 0;}
  .pomo-mode{font-size:12.5px; text-transform:uppercase; letter-spacing:.6px; color:var(--ink-soft); font-weight:700;}
  .pomo-controls{display:flex; gap:10px; justify-content:center; margin-top:16px;}
  .pomo-controls button{background:var(--slate); color:#fff; padding:10px 20px; border-radius:10px; font-weight:650; font-size:13.5px;}
  .pomo-controls button.secondary{background:var(--bg); color:var(--ink);}
  .pomo-select{display:flex; gap:8px; justify-content:center; margin-top:14px;}
  .pomo-select select{font-size:13px;}

  .session-log-item{display:flex; justify-content:space-between; padding:9px 12px; background:var(--bg); border-radius:8px; margin-bottom:6px; font-size:13px;}
  .session-log-item .mod-name{font-weight:600;}
  .session-log-item .dur{color:var(--ink-soft);}

  .stale-item{display:flex; align-items:center; gap:12px; padding:12px 14px; background:var(--bg-soft); border:1px solid var(--line); border-radius:11px; margin-bottom:8px;}
  .stale-item .badge{width:8px; height:8px; border-radius:50%; flex-shrink:0;}
  .stale-item .info{flex:1;}
  .stale-item .info .ch{font-size:13.5px; font-weight:600;}
  .stale-item .info .mod{font-size:11.5px; color:var(--ink-soft);}
  .stale-item .days{font-size:11.5px; color:var(--ink-soft); white-space:nowrap;}

  #fabChat{
    position:fixed; bottom:24px; right:24px; width:56px; height:56px; border-radius:50%;
    background:linear-gradient(135deg,var(--slate),var(--slate-deep)); color:#fff; font-size:24px;
    display:flex; align-items:center; justify-content:center; box-shadow:0 4px 18px rgba(40,60,90,.3);
    cursor:pointer; z-index:80; transition:transform .15s;
  }
  #fabChat:hover{transform:scale(1.06);}
  #chatWindow{
    position:fixed; bottom:92px; right:24px; width:380px; max-width:92vw; height:520px; max-height:72vh;
    background:var(--bg-soft); border:1px solid var(--line); border-radius:16px; box-shadow:0 10px 40px rgba(0,0,0,.18);
    display:none; flex-direction:column; overflow:hidden; z-index:81;
  }
  #chatWindow.open{display:flex; animation:fadeIn .2s ease;}
  #chatHeader{padding:14px 16px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; flex-shrink:0;}
  #chatHeader strong{font-size:13.5px;}
  #chatHeader .sub{font-size:11px; color:var(--ink-soft);}
  #chatMessages{flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px;}
  .msg{max-width:84%; padding:10px 13px; border-radius:13px; font-size:13.5px; line-height:1.5; white-space:pre-wrap;}
  .msg.user{align-self:flex-end; background:var(--slate); color:#fff; border-bottom-right-radius:4px;}
  .msg.ai{align-self:flex-start; background:var(--bg); border:1px solid var(--line); border-bottom-left-radius:4px;}
  .msg.sys{align-self:center; font-size:11.5px; color:var(--ink-soft); background:none; text-align:center;}
  .msg img.upload-preview{max-width:100%; border-radius:8px; margin-top:6px; display:block;}
  #chatInputBar{padding:12px; border-top:1px solid var(--line); display:flex; gap:8px; flex-shrink:0; align-items:flex-end;}
  #chatInputBar textarea{flex:1; resize:none; min-height:38px; max-height:100px; font-size:13px;}
  #chatInputBar button.send-btn{background:var(--slate); color:#fff; padding:0 14px; height:38px; border-radius:9px; font-weight:600; font-size:13px;}
  #chatInputBar button.send-btn:disabled{opacity:.5;}
  #chatInputBar .photo-btn{font-size:17px; padding:0 8px; height:38px; color:var(--ink-soft); flex-shrink:0;}
  .chat-shortcuts{display:flex; gap:6px; padding:0 12px 10px; flex-wrap:wrap; flex-shrink:0;}
  .chat-shortcut-chip{font-size:11px; background:var(--bg); border:1px solid var(--line); padding:5px 9px; border-radius:14px; cursor:pointer; color:var(--ink-soft);}
  .chat-shortcut-chip:hover{background:var(--slate); color:#fff; border-color:var(--slate);}

  .gemini-setup{background:var(--bg-soft); border:1px solid var(--line); border-radius:14px; padding:22px; max-width:480px; box-shadow:var(--shadow);}
  .gemini-setup h3{font-size:15px; margin-bottom:8px;}
  .gemini-setup p{font-size:12.5px; color:var(--ink-soft); margin-bottom:14px; line-height:1.6;}
  .gemini-setup input{width:100%; margin-bottom:10px;}
  .gemini-setup .save-btn{background:var(--slate); color:#fff; padding:9px 16px; border-radius:8px; font-size:13.5px; font-weight:600;}
  .gemini-setup .hint{font-size:11px; color:var(--ink-soft); margin-top:10px;}
  .gemini-setup a{text-decoration:underline;}

  .drive-card{background:var(--bg-soft); border:1px solid var(--line); border-radius:var(--radius); padding:22px; box-shadow:var(--shadow); margin-bottom:18px;}
  .drive-card h3{font-size:15px; margin-bottom:10px;}
  .drive-card p{font-size:13px; color:var(--ink-soft); line-height:1.6; margin-bottom:14px;}
  .drive-link-row{display:flex; gap:10px; flex-wrap:wrap;}
  .drive-link-row input{flex:1; min-width:160px;}
  .drive-btn{background:var(--amber); color:#5b3d18; padding:10px 18px; border-radius:9px; font-weight:650; font-size:13.5px; white-space:nowrap;}
  .drive-btn.secondary{background:var(--bg); color:var(--ink);}
  .saved-drive-link{display:flex; align-items:center; gap:10px; margin-top:12px; padding:12px 14px; background:var(--amber-soft); border:1px solid var(--amber); border-radius:10px; font-size:13.5px;}
  .saved-drive-link a{font-weight:650; color:var(--slate-deep);}

<script>
// Safe deep-clone fallback for browsers/devices without structuredClone (older phones, older Safari/Chrome)
if (typeof structuredClone !== "function") {
  window.structuredClone = function(obj) {
    return JSON.parse(JSON.stringify(obj));
  };
}

// ===================== ÉTAT & PERSISTANCE =====================
const STORAGE_KEY = "bacprep_state_v2";

const DEFAULT_STATE = {
  examDate: "2027-06-03",
  geminiKey: "",
  driveLink: "",
  darkMode: false,
  chapters: {},       // chapterKey -> { done, resources, notes, confidence, lastReviewed, custom, title }
  moduleLinks: {},     // moduleId -> [{label,url}]
  customChapters: {},  // moduleId -> [extra chapter titles added by user]
  deletedChapters: {}, // moduleId -> [indices hidden/deleted]
  downloadQueue: [],
  chatHistory: [],
  pomodoroLog: [],     // [{moduleId, moduleName, minutes, date}]
  medecine: { chapters: {} } // concours-subjectId::idx -> {done, confidence}
};

let STATE = structuredClone(DEFAULT_STATE);

function chapterKey(moduleId, idx){ return moduleId + "::" + idx; }

function getChapterData(moduleId, idx){
  const key = chapterKey(moduleId, idx);
  if(!STATE.chapters[key]){
    STATE.chapters[key] = { done:false, resources:[], notes:"", confidence:0, lastReviewed:null };
  }
  return STATE.chapters[key];
}

function getMedChapterData(subjectId, idx){
  const key = subjectId + "::" + idx;
  if(!STATE.medecine.chapters[key]){
    STATE.medecine.chapters[key] = { done:false, confidence:0 };
  }
  return STATE.medecine.chapters[key];
}

// Returns the live chapter list for a module: built-in (minus deleted, with title overrides) + custom appended
function getModuleChapters(mod){
  const deleted = new Set(STATE.deletedChapters[mod.id] || []);
  const builtin = mod.chapters
    .map((title, idx) => {
      const override = STATE.chapters[chapterKey(mod.id, idx)];
      const liveTitle = (override && override.title) ? override.title : title;
      return { title: liveTitle, origIdx: idx };
    })
    .filter(c => !deleted.has(c.origIdx));
  const custom = (STATE.customChapters[mod.id] || []).map((title, ci) => ({ title, origIdx: "custom:" + ci }));
  return [...builtin, ...custom];
}

function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE));
  }catch(e){ console.warn("save failed", e); }
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      STATE = Object.assign(structuredClone(DEFAULT_STATE), parsed);
      STATE.chapters = parsed.chapters || {};
      STATE.moduleLinks = parsed.moduleLinks || {};
      STATE.customChapters = parsed.customChapters || {};
      STATE.deletedChapters = parsed.deletedChapters || {};
      STATE.pomodoroLog = parsed.pomodoroLog || [];
      STATE.medecine = parsed.medecine || { chapters:{} };
    }
  }catch(e){
    // no saved data yet — keep defaults
  }
}

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(()=> t.classList.remove("show"), 2200);
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function escapeAttr(s){ return escapeHtml(s); }

// ===================== DARK MODE =====================
function applyDarkMode(){
  document.body.classList.toggle("dark", !!STATE.darkMode);
  const sw = document.getElementById("darkSwitch");
  if(sw) sw.classList.toggle("on", !!STATE.darkMode);
}

// ===================== PROGRESS CALCULATION =====================
function moduleProgress(mod){
  const list = getModuleChapters(mod);
  const total = list.length;
  let done = 0;
  list.forEach(c => {
    const idx = c.origIdx;
    const key = chapterKey(mod.id, idx);
    if(STATE.chapters[key] && STATE.chapters[key].done) done++;
  });
  return { done, total, pct: total ? Math.round((done/total)*100) : 0 };
}

function globalProgress(){
  let totalChapters = 0, doneChapters = 0;
  let weightedDone = 0, weightedTotal = 0;
  CURRICULUM.forEach(mod => {
    const p = moduleProgress(mod);
    totalChapters += p.total;
    doneChapters += p.done;
    weightedTotal += mod.coef;
    weightedDone += mod.coef * (p.total ? p.done/p.total : 0);
  });
  return {
    totalChapters, doneChapters,
    pct: totalChapters ? Math.round((doneChapters/totalChapters)*100) : 0,
    weightedPct: weightedTotal ? Math.round((weightedDone/weightedTotal)*100) : 0
  };
}

function countResources(){
  let n = 0;
  Object.values(STATE.chapters).forEach(c => n += (c.resources||[]).length);
  return n;
}

// ===================== COUNTDOWN =====================
function renderCountdown(){
  const el = document.getElementById("countdown");
  const target = new Date(STATE.examDate + "T08:00:00");
  const now = new Date();
  let diff = target - now;
  if(diff < 0){
    el.innerHTML = `<div class="cd-unit"><b>—</b><span>Examen passé</span></div>`;
    return;
  }
  const totalDays = Math.floor(diff / 86400000);
  const months = Math.floor(totalDays / 30.44);
  const days = totalDays - Math.floor(months * 30.44);
  const hours = Math.floor((diff % 86400000) / 3600000);

  el.innerHTML = `
    <div class="cd-unit"><b>${months}</b><span>mois</span></div>
    <div class="cd-sep">·</div>
    <div class="cd-unit"><b>${days}</b><span>jours</span></div>
    <div class="cd-sep">·</div>
    <div class="cd-unit"><b>${hours}</b><span>heures</span></div>
    <span class="editdate" onclick="goView('settings')">modifier</span>
  `;
}

    const confDots = [1,2,3,4,5].map(n =>
      `<div class="conf-dot ${data.confidence>=n ? 'active-'+data.confidence : ''}" onclick="setConfidence('${modId}','${idx}',${n})">${n}</div>`
    ).join("");

    const resHTML = (data.resources||[]).map((r, ri) => {
      const tagClass = {pdf:"tag-pdf", video:"tag-video", playlist:"tag-playlist", link:"tag-link"}[r.type] || "tag-link";
      const icon = {pdf:"📄", video:"▶", playlist:"▶▶", link:"🔗"}[r.type] || "🔗";

        <div class="chapter-top">
          <div class="chk ${data.done ? 'checked' : ''}" onclick="toggleChapter('${modId}','${idx}')">${data.done ? '✓' : ''}</div>

          </div>

            <span class="icon-btn" onclick="startEditChapter('${modId}','${idx}')" title="Modifier le titre">✎</span>
            <span class="icon-btn danger" onclick="deleteChapter('${modId}','${idx}')" title="Supprimer ce chapitre">🗑</span>
            <span class="expand-btn" onclick="toggleExpand('${modId}','${idx}')" id="expbtn-${modId}-${idx}">+ détails</span>
          </div>
        </div>
        <div class="chapter-body" id="chapbody-${modId}-${idx}">

            <span class="lbl">Niveau de maîtrise :</span>
            ${confDots}
          </div>
          <div class="res-row">
            <select id="restype-${modId}-${idx}">
              <option value="pdf">PDF</option>
              <option value="video">Vidéo</option>
              <option value="playlist">Playlist</option>
              <option value="link">Lien</option>
            </select>
            <input type="text" id="reslabel-${modId}-${idx}" placeholder="Nom (ex: Cours AlloSchool)">
            <input type="text" id="resurl-${modId}-${idx}" placeholder="https://...">
            <button class="add-btn" onclick="addResource('${modId}','${idx}')">+ Ajouter</button>
          </div>

          <div class="notes-box">

          </div>
        </div>
      </div>
    `;
  }).join("");

  el.innerHTML = `
    <div class="back-link" onclick="goView('modules')">← Retour aux modules</div>
    <div class="module-header">

function toggleExpand(modId, idx){
  const body = document.getElementById(`chapbody-${modId}-${idx}`);
  const btn = document.getElementById(`expbtn-${modId}-${idx}`);
  const open = body.classList.toggle("open");
  btn.textContent = open ? "− masquer" : "+ détails";
}

function toggleChapter(modId, idx){
  const data = getChapterData(modId, idx);
  data.done = !data.done;
  if(data.done) data.lastReviewed = Date.now();
  saveState();
  renderModuleDetail(modId);
  renderSidebarProgress();
}

function setConfidence(modId, idx, n){
  const data = getChapterData(modId, idx);
  data.confidence = data.confidence === n ? 0 : n;
  data.lastReviewed = Date.now();
  saveState();
  renderModuleDetail(modId);
  document.getElementById(`chapbody-${modId}-${idx}`).classList.add("open");
  document.getElementById(`expbtn-${modId}-${idx}`).textContent = "− masquer";
}

function addResource(modId, idx){
  const type = document.getElementById(`restype-${modId}-${idx}`).value;
  const label = document.getElementById(`reslabel-${modId}-${idx}`).value.trim();
  const url = document.getElementById(`resurl-${modId}-${idx}`).value.trim();
  if(!url){ showToast("Ajoute un lien avant de valider."); return; }
  let finalUrl = url;
  if(!/^https?:\/\//i.test(finalUrl)) finalUrl = "https://" + finalUrl;
  const data = getChapterData(modId, idx);
  data.resources = data.resources || [];
  data.resources.push({ type, label: label || finalUrl, url: finalUrl });
  saveState();
  renderModuleDetail(modId);
  document.getElementById(`chapbody-${modId}-${idx}`).classList.add("open");
  document.getElementById(`expbtn-${modId}-${idx}`).textContent = "− masquer";
  showToast("Ressource ajoutée ✓");
}

function removeResource(modId, idx, resIdx){
  const data = getChapterData(modId, idx);
  data.resources.splice(resIdx, 1);
  saveState();
  renderModuleDetail(modId);
  document.getElementById(`chapbody-${modId}-${idx}`).classList.add("open");
  document.getElementById(`expbtn-${modId}-${idx}`).textContent = "− masquer";
}

function saveNotes(modId, idx){
  const val = document.getElementById(`notes-${modId}-${idx}`).value;
  getChapterData(modId, idx).notes = val;
  saveState();
}

// ----- Edit / delete / add chapters -----
function startEditChapter(modId, idx){
  const titleEl = document.getElementById(`chaptitle-${modId}-${idx}`);
  const mod = CURRICULUM.find(m => m.id === modId);
  const list = getModuleChapters(mod);
  const current = list.find(c => String(c.origIdx) === String(idx));
  const currentTitle = current ? current.title : "";
  titleEl.innerHTML = `
    <div class="edit-chapter-row">
      <input type="text" id="editinput-${modId}-${idx}" value="${escapeAttr(currentTitle)}">
      <button class="add-btn" onclick="saveEditChapter('${modId}','${idx}')">✓ Valider</button>
    </div>
  `;
  document.getElementById(`editinput-${modId}-${idx}`).focus();
}

function saveEditChapter(modId, idx){
  const newTitle = document.getElementById(`editinput-${modId}-${idx}`).value.trim();
  if(!newTitle){ showToast("Le titre ne peut pas être vide."); return; }

  if(typeof idx === "string" && idx.startsWith("custom:")){
    const ci = parseInt(idx.split(":")[1]);
    STATE.customChapters[modId][ci] = newTitle;
  } else {
    // persist override — getModuleChapters() reads this back on every render/reload
    getChapterData(modId, idx).title = newTitle;
  }
  saveState();
  renderModuleDetail(modId);
  showToast("Chapitre modifié ✓");
}

function deleteChapter(modId, idx){
  if(!confirm("Supprimer ce chapitre ? Ses ressources et notes seront aussi supprimées.")) return;
  if(typeof idx === "string" && idx.startsWith("custom:")){
    const ci = parseInt(idx.split(":")[1]);
    STATE.customChapters[modId].splice(ci, 1);
  } else {
    if(!STATE.deletedChapters[modId]) STATE.deletedChapters[modId] = [];
    STATE.deletedChapters[modId].push(idx);
    delete STATE.chapters[chapterKey(modId, idx)];
  }
  saveState();
  renderModuleDetail(modId);
  showToast("Chapitre supprimé.");
}

function addNewChapter(modId){
  if(!STATE.customChapters[modId]) STATE.customChapters[modId] = [];
  STATE.customChapters[modId].push("Nouveau chapitre — clique sur ✎ pour renommer");
  saveState();
  renderModuleDetail(modId);
  showToast("Chapitre ajouté — modifie son titre.");
}

// ===================== FLASHCARDS =====================
let flashDeck = [];
let flashIndex = 0;
let flashFlipped = false;
let flashSelectedModule = "all";

function buildFlashDeck(moduleFilter){
  let deck = [];
  CURRICULUM.forEach(mod => {
    if(moduleFilter !== "all" && mod.id !== moduleFilter) return;
    const list = getModuleChapters(mod);
    list.forEach(c => {
      const data = getChapterData(mod.id, c.origIdx);
      deck.push({
        modName: mod.name,
        modColor: mod.color,
        front: c.title,
        back: data.notes && data.notes.trim() ? data.notes.trim() : "Pas encore de notes pour ce chapitre — ajoute-en depuis la page du module pour enrichir cette carte.",
        modId: mod.id,
        idx: c.origIdx
      });
    });
  });
  // shuffle
  for(let i = deck.length-1; i>0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [deck[i],deck[j]] = [deck[j],deck[i]];
  }
  return deck;
}

function renderFlashcardsHome(){
  const el = document.getElementById("view-flashcards");
  const options = CURRICULUM.map(m => `<option value="${m.id}">${escapeHtml(m.name)}</option>`).join("");
  el.innerHTML = `
    <div class="flash-controls">
      <span style="font-size:13px; color:var(--ink-soft);">Matière :</span>
      <select id="flashModuleSelect" onchange="startFlashSession()">
        <option value="all">Toutes les matières</option>
        ${options}
      </select>
      <button class="add-btn" onclick="startFlashSession()">↻ Nouvelle session</button>
    </div>
    <div id="flashStage"></div>
  `;
  startFlashSession();
}

function startFlashSession(){
  const sel = document.getElementById("flashModuleSelect");
  flashSelectedModule = sel ? sel.value : "all";
  flashDeck = buildFlashDeck(flashSelectedModule);
  flashIndex = 0;
  flashFlipped = false;
  renderFlashStage();
}

function renderFlashStage(){
  const stage = document.getElementById("flashStage");
  if(flashDeck.length === 0){
    stage.innerHTML = `<div class="empty-state"><div class="big">▢</div>Aucun chapitre à réviser pour cette sélection.</div>`;
    return;
  }
  const card = flashDeck[flashIndex];
  stage.innerHTML = `
    <div class="flashcard" onclick="flipFlashcard()">
      <span class="face-label" style="color:${card.modColor}">${escapeHtml(card.modName)} · ${flashFlipped ? 'réponse / notes' : 'chapitre'}</span>
      ${flashFlipped ? escapeHtml(card.back) : escapeHtml(card.front)}
    </div>
    <div class="flash-nav">
      <button onclick="prevFlashcard()">← Précédent</button>
      <button onclick="flipFlashcard()">⟲ Retourner</button>
      <button onclick="nextFlashcard()">Suivant →</button>
    </div>
    <div class="flash-progress">Carte ${flashIndex+1} / ${flashDeck.length}</div>
    ${flashFlipped ? `
      <div class="flash-rate-row">
        <span style="font-size:12px; color:var(--ink-soft); align-self:center;">Comment c'était ?</span>
        <button style="background:#fde3df; color:#a4503f;" onclick="rateFlashcard(1)">Difficile</button>
        <button style="background:#fdf3df; color:#a47a3f;" onclick="rateFlashcard(3)">Moyen</button>
        <button style="background:#e3eee3; color:#3f6b3f;" onclick="rateFlashcard(5)">Facile</button>
      </div>
    ` : ""}
  `;
}

function flipFlashcard(){
  flashFlipped = !flashFlipped;
  renderFlashStage();
}
function nextFlashcard(){
  flashIndex = (flashIndex + 1) % flashDeck.length;
  flashFlipped = false;
  renderFlashStage();
}
function prevFlashcard(){
  flashIndex = (flashIndex - 1 + flashDeck.length) % flashDeck.length;
  flashFlipped = false;
  renderFlashStage();
}
function rateFlashcard(score){
  const card = flashDeck[flashIndex];
  const data = getChapterData(card.modId, card.idx);
  data.confidence = score;
  data.lastReviewed = Date.now();
  saveState();
  nextFlashcard();
}

// ===================== POMODORO =====================
let pomoState = {
  running: false,
  mode: "work", // work | break
  secondsLeft: 25*60,
  workMin: 25,
  breakMin: 5,
  moduleId: "",
  intervalId: null
};

function renderPomodoro(){
  const el = document.getElementById("view-pomodoro");
  const options = CURRICULUM.map(m => `<option value="${m.id}">${escapeHtml(m.name)}</option>`).join("");
  const todayLog = STATE.pomodoroLog.filter(s => isToday(s.date));
  const totalTodayMin = todayLog.reduce((sum,s) => sum + s.minutes, 0);

  const logHTML = STATE.pomodoroLog.slice().reverse().slice(0, 12).map(s => `
    <div class="session-log-item">
      <span class="mod-name">${escapeHtml(s.moduleName)}</span>
      <span class="dur">${s.minutes} min · ${new Date(s.date).toLocaleDateString('fr-FR', {day:'numeric', month:'short'})}</span>
    </div>
  `).join("") || `<div style="font-size:13px; color:var(--ink-soft);">Aucune session enregistrée encore.</div>`;

  el.innerHTML = `
    <div class="pomo-card">
      <div class="pomo-mode" id="pomoModeLabel">${pomoState.mode === 'work' ? 'Concentration' : 'Pause'}</div>
      <div class="pomo-time" id="pomoTimeDisplay">${formatPomoTime(pomoState.secondsLeft)}</div>
      <select id="pomoModuleSelect" style="width:100%;">
        <option value="">— Matière (optionnel) —</option>
        ${options}
      </select>
      <div class="pomo-select">
        <select id="pomoWorkLen" onchange="updatePomoLengths()">
          ${[15,25,30,45,50].map(n => `<option value="${n}" ${n===pomoState.workMin?'selected':''}>${n} min travail</option>`).join("")}
        </select>
        <select id="pomoBreakLen" onchange="updatePomoLengths()">
          ${[5,10,15].map(n => `<option value="${n}" ${n===pomoState.breakMin?'selected':''}>${n} min pause</option>`).join("")}
        </select>
      </div>
      <div class="pomo-controls">
        <button onclick="pomoStartPause()" id="pomoStartBtn">${pomoState.running ? '⏸ Pause' : '▶ Démarrer'}</button>
        <button class="secondary" onclick="pomoReset()">↻ Réinitialiser</button>
      </div>
    </div>

    <div class="stat-card" style="max-width:380px; margin:0 auto 24px;">
      <div class="num">${totalTodayMin} min</div>
      <div class="lbl">Temps d'étude aujourd'hui</div>
    </div>

    <div class="section-title">Sessions récentes</div>
    <div style="max-width:480px; margin:0 auto;">${logHTML}</div>
  `;
}

function isToday(ts){
  const d = new Date(ts), now = new Date();
  return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth() && d.getDate()===now.getDate();
}

function formatPomoTime(sec){
  const m = Math.floor(sec/60).toString().padStart(2,"0");
  const s = (sec%60).toString().padStart(2,"0");
  return `${m}:${s}`;
}

function updatePomoLengths(){
  pomoState.workMin = parseInt(document.getElementById("pomoWorkLen").value);
  pomoState.breakMin = parseInt(document.getElementById("pomoBreakLen").value);
  if(!pomoState.running){
    pomoState.secondsLeft = (pomoState.mode === "work" ? pomoState.workMin : pomoState.breakMin) * 60;
    document.getElementById("pomoTimeDisplay").textContent = formatPomoTime(pomoState.secondsLeft);
  }
}

function pomoStartPause(){
  if(pomoState.running){
    clearInterval(pomoState.intervalId);
    pomoState.running = false;
  } else {
    pomoState.running = true;
    pomoState.intervalId = setInterval(pomoTick, 1000);
  }
  document.getElementById("pomoStartBtn").textContent = pomoState.running ? "⏸ Pause" : "▶ Démarrer";
}

function pomoTick(){
  pomoState.secondsLeft--;
  if(pomoState.secondsLeft <= 0){
    if(pomoState.mode === "work"){
      // log the completed work session
      const sel = document.getElementById("pomoModuleSelect");
      const modId = sel ? sel.value : "";
      const mod = CURRICULUM.find(m => m.id === modId);
      STATE.pomodoroLog.push({
        moduleId: modId || null,
        moduleName: mod ? mod.name : "Sans matière",
        minutes: pomoState.workMin,
        date: Date.now()
      });
      saveState();
      pomoState.mode = "break";
      pomoState.secondsLeft = pomoState.breakMin * 60;
      showToast("Session terminée ! Pause méritée ☕");
    } else {
      pomoState.mode = "work";
      pomoState.secondsLeft = pomoState.workMin * 60;
      showToast("Pause finie — retour au travail 💪");
    }
  }
  const display = document.getElementById("pomoTimeDisplay");
  const label = document.getElementById("pomoModeLabel");
  if(display){
    display.textContent = formatPomoTime(pomoState.secondsLeft);
    label.textContent = pomoState.mode === "work" ? "Concentration" : "Pause";
  } else {
    // view changed — stop ticking quietly, re-render will be needed
  }
  if(pomoState.secondsLeft === (pomoState.mode==="work"?pomoState.workMin:pomoState.breakMin)*60 - 0){
    // session boundary — refresh the log/today widgets if still on this view
    if(document.getElementById("view-pomodoro").classList.contains("active")) renderPomodoro();
  }
}

function pomoReset(){
  clearInterval(pomoState.intervalId);
  pomoState.running = false;
  pomoState.mode = "work";
  pomoState.secondsLeft = pomoState.workMin * 60;
  renderPomodoro();
}

// ===================== WEEKLY REVIEW PLANNER =====================
function renderPlanner(){
  const el = document.getElementById("view-planner");
  const now = Date.now();
  const DAY = 86400000;
  let items = [];

  CURRICULUM.forEach(mod => {
    const list = getModuleChapters(mod);
    list.forEach(c => {
      const data = getChapterData(mod.id, c.origIdx);
      if(!data.done) return; // only review chapters already studied at least once
      const last = data.lastReviewed || 0;
      const daysSince = Math.floor((now - last) / DAY);
      if(daysSince >= 5){
        items.push({ modName: mod.name, modColor: mod.color, modId: mod.id, idx: c.origIdx, title: c.title, daysSince, confidence: data.confidence });
      }
    });
  });

  // prioritize: longest untouched first, then lowest confidence
  items.sort((a,b) => {
    if(b.daysSince !== a.daysSince) return b.daysSince - a.daysSince;
    return (a.confidence||0) - (b.confidence||0);
  });

  const itemsHTML = items.slice(0, 25).map(it => {
    const urgency = it.daysSince > 14 ? "#c97a6b" : it.daysSince > 8 ? "#d9a85e" : "#9bbf7e";
    return `
      <div class="stale-item">
        <div class="badge" style="background:${urgency}"></div>
        <div class="info">
          <div class="ch">${escapeHtml(it.title)}</div>
          <div class="mod">${escapeHtml(it.modName)}${it.confidence ? ' · confiance ' + it.confidence + '/5' : ''}</div>
        </div>
        <div class="days">${it.daysSince}j sans révision</div>
        <button class="add-btn" onclick="openModuleDetail('${it.modId}')">Revoir</button>
      </div>
    `;
  }).join("");

  el.innerHTML = `
    <div class="drive-card">
      <h3>Comment ça marche</h3>
      <p>Cette page repère les chapitres que tu as déjà cochés "terminés" mais que tu n'as pas revus (coché une confiance ou ouvert) depuis 5 jours ou plus. Plus c'est rouge, plus ça urge.</p>
    </div>
    <div class="section-title">À revoir en priorité (${items.length})</div>
    ${itemsHTML || `<div class="empty-state"><div class="big">✓</div>Rien à revoir pour le moment — soit tu n'as encore rien terminé, soit tout est frais dans ta tête !</div>`}
  `;
}

let pendingImageBase64 = null;

function useShortcut(type){
  const input = document.getElementById("chatInput");
  const prompts = {
    explain: "Explique-moi ça comme si j'étais un élève du Bac, étape par étape, avec un exemple simple : ",
    solve: "Voici un exercice. Donne-moi une solution guidée étape par étape (pas juste la réponse finale) : ",

  };

function handleChatKey(e){
  if(e.key === "Enter" && !e.shiftKey){
    e.preventDefault();
    sendChatMessage();
  }
}

function saveGeminiKey(){
  const key = document.getElementById("geminiKeyInput").value.trim();
  if(!key){ showToast("Colle une clé valide."); return; }
  STATE.geminiKey = key;
  saveState();
  renderChatBody();
  showToast("Gemini connecté ✓");
}

function handlePhotoUpload(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const result = e.target.result; // data:image/png;base64,XXXX
    const [meta, base64] = result.split(",");
    pendingImageMime = meta.match(/data:(.*);base64/)[1];
    pendingImageBase64 = base64;
    showToast("Photo prête — écris ta question et envoie.");
    const input = document.getElementById("chatInput");
    if(!input.value) input.value = "Voici un exercice, aide-moi à le résoudre étape par étape : ";
    input.focus();
  };
  reader.readAsDataURL(file);
  event.target.value = "";
}

function renderChatMessages(){
  const box = document.getElementById("chatMessages");
  if(!box) return;
  if(STATE.chatHistory.length === 0){
    box.innerHTML = `<div class="msg sys">Pose ta première question — ou envoie une photo d'exercice de maths/physique avec 📷.</div>`;
    return;
  }
  box.innerHTML = STATE.chatHistory.map(m => {
    const imgHTML = m.imageData ? `<img class="upload-preview" src="data:${m.imageMime};base64,${m.imageData}">` : "";
    return `<div class="msg ${m.role === 'user' ? 'user' : 'ai'}">${escapeHtml(m.text)}${imgHTML}</div>`;
  }).join("");
  box.scrollTop = box.scrollHeight;
}

async function sendChatMessage(){
  const input = document.getElementById("chatInput");
  const text = input.value.trim();
  if(!text && !pendingImageBase64) return;

  const userMsg = { role: "user", text: text || "(photo envoyée)" };
  if(pendingImageBase64){
    userMsg.imageData = pendingImageBase64;
    userMsg.imageMime = pendingImageMime;
  }
  STATE.chatHistory.push(userMsg);
  saveState();
  input.value = "";
  renderChatMessages();

  const btn = document.getElementById("chatSendBtn");
  btn.disabled = true;
  const box = document.getElementById("chatMessages");
  box.insertAdjacentHTML("beforeend", `<div class="msg ai" id="loadingMsg">···</div>`);
  box.scrollTop = box.scrollHeight;

  const imgToSend = pendingImageBase64;
  const imgMimeToSend = pendingImageMime;
  pendingImageBase64 = null;
  pendingImageMime = null;

  try{
    const contents = STATE.chatHistory.map(m => {
      const parts = [{ text: m.text }];
      if(m.imageData){
        parts.push({ inlineData: { mimeType: m.imageMime, data: m.imageData } });
      }
      return { role: m.role === "user" ? "user" : "model", parts };
    });

    const resp = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${STATE.geminiKey}`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents,
          systemInstruction: {
            parts: [{ text: "Tu es un assistant pédagogique pour un élève marocain qui prépare le Bac Libre, filière Sciences Physiques, et potentiellement le concours Médecine. Réponds en français clair, pédagogique, avec des étapes numérotées pour les exercices de maths/physique/chimie. Si une image est fournie, lis l'énoncé et donne une solution guidée étape par étape plutôt que juste le résultat final." }]
          }
        })
      }
    );
    const json = await resp.json();
    document.getElementById("loadingMsg")?.remove();

    if(json.error){
      STATE.chatHistory.push({ role:"ai", text: "Erreur Gemini : " + json.error.message });
    } else {
      const reply = json.candidates?.[0]?.content?.parts?.[0]?.text || "Pas de réponse reçue.";
      STATE.chatHistory.push({ role: "ai", text: reply });
    }
  }catch(err){
    document.getElementById("loadingMsg")?.remove();
    STATE.chatHistory.push({ role:"ai", text: "Erreur de connexion à Gemini : " + err.message });
  }

  saveState();
  renderChatMessages();
  btn.disabled = false;
}

}

function saveDriveLink(){
  const val = document.getElementById("driveLinkInput").value.trim();
  if(!val){ showToast("Colle un lien Drive."); return; }
  STATE.driveLink = val.startsWith("http") ? val : "https://" + val;
  saveState();
  renderDrive();
  showToast("Dossier Drive lié ✓");
}
function clearDriveLink(){
  STATE.driveLink = "";
  saveState();
  renderDrive();
}
function addQueueItem(){
  const name = document.getElementById("queueNameInput").value.trim() || "Document";
  const url = document.getElementById("queueUrlInput").value.trim();
  if(!url){ showToast("Colle un lien PDF."); return; }
  const finalUrl = /^https?:\/\//i.test(url) ? url : "https://" + url;
  STATE.downloadQueue.push({ name, url: finalUrl, addedAt: Date.now() });
  saveState();
  renderDrive();
}
function removeQueueItem(i){
  STATE.downloadQueue.splice(i, 1);
  saveState();
  renderDrive();
}

// ===================== SETTINGS =====================
function renderSettings(){
  const el = document.getElementById("view-settings");
  el.innerHTML = `
    <div class="drive-card" style="max-width:480px;">
      <h3>📅 Date de l'examen national</h3>
      <p>La session 2027 n'est pas encore officiellement annoncée — modifie-la dès que le ministère publie la date exacte.</p>
      <div class="drive-link-row">
        <input type="date" id="examDateInput" value="${STATE.examDate}">
        <button class="drive-btn" onclick="saveExamDate()">Enregistrer</button>
      </div>
    </div>

    <div class="drive-card" style="max-width:480px;">
      <h3>💾 Sauvegarde de tes données</h3>
      <p>Tes données sont stockées uniquement dans ce navigateur, sur cet appareil. Télécharge une sauvegarde régulièrement et garde-la dans ton Drive.</p>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button class="drive-btn" onclick="exportBackup()">⬇ Télécharger une sauvegarde</button>
        <button class="drive-btn secondary" onclick="document.getElementById('importFile').click()">⬆ Restaurer une sauvegarde</button>
      </div>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importBackup(event)">
    </div>

    <div class="drive-card" style="max-width:480px;">
      <h3>🗑 Réinitialiser les données</h3>
      <p>Efface toute ta progression sur cet appareil. Action irréversible — fais une sauvegarde avant si besoin.</p>
      <button class="drive-btn secondary" onclick="resetAllData()">Réinitialiser tout</button>
    </div>
  `;
}

function exportBackup(){
  const blob = new Blob([JSON.stringify(STATE, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const dateStr = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `bac-libre-sauvegarde-${dateStr}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast("Sauvegarde téléchargée ✓");
}

function importBackup(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try{
      const parsed = JSON.parse(e.target.result);
      if(!parsed || typeof parsed !== "object"){ throw new Error("format invalide"); }
      STATE = Object.assign(structuredClone(DEFAULT_STATE), parsed);
      saveState();
      goView("dashboard");
      renderSidebarProgress();
      applyDarkMode();
      showToast("Sauvegarde restaurée ✓");
    }catch(err){
      showToast("Fichier invalide — impossible de restaurer.");
    }
  };
  reader.readAsText(file);
  event.target.value = "";
}

function saveExamDate(){
  const val = document.getElementById("examDateInput").value;
  if(!val) return;
  STATE.examDate = val;
  saveState();
  renderCountdown();
  showToast("Date mise à jour ✓");
}

function resetAllData(){
  if(!confirm("Tout effacer ? Cette action est irréversible.")) return;
  STATE = structuredClone(DEFAULT_STATE);
  saveState();
  goView("dashboard");
  renderSidebarProgress();
  applyDarkMode();
  showToast("Données réinitialisées.");
}

// ===================== INIT =====================
function init(){
  try{
    loadState();
  }catch(e){
    console.warn("init load error", e);
  }
  applyDarkMode();
  renderCountdown();
  setInterval(renderCountdown, 60000);
  renderSidebarProgress();
  renderDashboard();

  document.querySelectorAll(".navbtn").forEach(btn => {
    btn.addEventListener("click", () => goView(btn.dataset.view));
  });
  document.getElementById("menuToggle").addEventListener("click", () => {
    document.getElementById("sidebar").classList.toggle("open");
  });
}

init();

</script>
</body>
</html>
